<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #1e293b;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .header h1 .dot.loading { background: #eab308; animation: pulse 1.5s ease-in-out infinite; }
    .header h1 .dot.error { background: #ef4444; }

    .shortcut {
      font-size: 11px;
      color: #64748b;
      background: #1e293b;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: monospace;
    }

    .record-section {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #334155;
      background: #1e293b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      position: relative;
    }

    .mic-btn:hover { border-color: #6366f1; background: #1e293b; }

    .mic-btn.recording {
      border-color: #ef4444;
      background: #1c1117;
      animation: pulse-ring 1.5s ease-in-out infinite;
    }

    .mic-btn.processing {
      border-color: #eab308;
      background: #1c1a11;
      cursor: wait;
    }

    .mic-btn svg { width: 28px; height: 28px; }
    .mic-btn .mic-icon { fill: #94a3b8; transition: fill 0.2s; }
    .mic-btn:hover .mic-icon { fill: #6366f1; }
    .mic-btn.recording .mic-icon { fill: #ef4444; }
    .mic-btn.processing .mic-icon { fill: #eab308; }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
      min-height: 18px;
    }

    .status-text.recording { color: #ef4444; }
    .status-text.processing { color: #eab308; }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .progress-bar.visible { display: block; }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .result-section {
      padding: 0 20px 16px;
      display: none;
    }

    .result-section.visible { display: block; }

    .result-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .result-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: #e2e8f0;
      max-height: 150px;
      overflow-y: auto;
      word-wrap: break-word;
    }

    .result-box::-webkit-scrollbar { width: 4px; }
    .result-box::-webkit-scrollbar-track { background: transparent; }
    .result-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    .result-raw {
      margin-top: 8px;
    }

    .result-raw .result-box {
      color: #94a3b8;
      font-size: 12px;
      max-height: 80px;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
    }

    .actions.hidden { display: none; }

    .btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover { background: #334155; border-color: #475569; }

    .btn-primary {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .btn-primary:hover { background: #4338ca; border-color: #4338ca; }

    .btn svg { width: 14px; height: 14px; fill: currentColor; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e2e8f0;
      left: 2px;
      top: 2px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #4f46e5; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

    .model-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #1e293b;
      color: #64748b;
    }

    .model-badge.ready { color: #22c55e; }
    .model-badge.loading { color: #eab308; }

    .error-text { color: #ef4444; font-size: 12px; text-align: center; padding: 8px 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="dot" id="statusDot"></span> WhisperFlow</h1>
    <span class="shortcut">Alt+Shift+R</span>
  </div>

  <div class="record-section">
    <button class="mic-btn" id="micBtn" title="Click to start recording">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path class="mic-icon" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path class="mic-icon" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <div class="status-text" id="statusText">Click to start recording</div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-label">Transcription</div>
    <div class="result-box" id="resultText"></div>
    <div class="result-raw" id="rawSection" style="display:none">
      <div class="result-label" style="margin-top:10px">Original</div>
      <div class="result-box" id="rawText"></div>
    </div>
  </div>

  <div class="actions hidden" id="actionsBar">
    <button class="btn" id="copyBtn">
      <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
      Copy
    </button>
    <button class="btn btn-primary" id="insertBtn">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Insert
    </button>
    <button class="btn" id="clearBtn">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      Clear
    </button>
  </div>

  <div class="footer">
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="autoPasteToggle">
        <span class="toggle-slider"></span>
      </label>
      Auto-paste
    </div>
    <span class="model-badge" id="modelBadge">whisper-tiny</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
